[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",   # line-too-long — no forzamos largo de línea en strings/prompts
    "B008",   # function-call-in-default-argument — común en LangChain
    "UP007",  # use-x-or-y-instead-of-optional — mantenemos Optional[] por consistencia
]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
